appId: com.sanity.app
productName: Wisadel
copyright: Copyright © 2026 LeamonAge
directories:
  output: release
  buildResources: assets
files:
  - main.js
  - preload.js
  - dist/**/*
  - assets/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.png
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Wisadel
publish:
  - provider: github
    owner: LeamonAge
    repo: Wisadel
    private: false
