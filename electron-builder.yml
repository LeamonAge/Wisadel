appId: com.sanity.app
productName: Wisadel
copyright: Copyright © 2026 LeamonAge
directories:
  output: release
  buildResources: assets
files:
  - main.js
  - preload.js
  - dist/**/*
  - assets/**/*
  - "!node_modules/**/*"
  - node_modules/electron-updater/**/*
  - node_modules/semver/**/*
  - node_modules/builder-util-runtime/**/*
  - node_modules/js-yaml/**/*
  - node_modules/argparse/**/*
  - node_modules/lodash.isequal/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/Wisadel.ico
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Wisadel
  artifactName: Wisadel-${version}-${arch}.${ext}
  installerHeader: assets/installer-header.bmp
  installerSidebar: assets/installer-sidebar.bmp
  uninstallerSidebar: assets/uninstaller-sidebar.bmp
publish:
  - provider: github
    owner: LeamonAge
    repo: Wisadel
    private: false
